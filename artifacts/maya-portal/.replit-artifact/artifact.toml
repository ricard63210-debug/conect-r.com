kind = "web"
previewPath = "/maya-portal/"
title = "Maya Cantina — NFC Portal"
version = "1.0.0"
id = "artifacts/maya-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/maya-portal/" ]
localPort = 22716

[services.development]
run = "pnpm --filter @workspace/maya-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/maya-portal", "run", "build" ]
publicDir = "artifacts/maya-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22716"
BASE_PATH = "/maya-portal/"
