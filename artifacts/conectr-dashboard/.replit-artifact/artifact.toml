kind = "web"
previewPath = "/"
title = "Conect-R Dashboard"
version = "1.0.0"
id = "artifacts/conectr-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19542

[services.development]
run = "pnpm --filter @workspace/conectr-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/conectr-dashboard", "run", "build" ]
publicDir = "artifacts/conectr-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19542"
BASE_PATH = "/"
