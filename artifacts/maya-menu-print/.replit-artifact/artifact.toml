kind = "web"
previewPath = "/maya-menu-print/"
title = "Maya Cantina — Menú Imprimible"
version = "1.0.0"
id = "artifacts/maya-menu-print"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/maya-menu-print/" ]
localPort = 20027

[services.development]
run = "pnpm --filter @workspace/maya-menu-print run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/maya-menu-print", "run", "build" ]
publicDir = "artifacts/maya-menu-print/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20027"
BASE_PATH = "/maya-menu-print/"
